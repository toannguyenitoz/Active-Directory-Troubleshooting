<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
<title id="title">Active Directory Troubleshooting Workflow</title><desc id="desc">A six-step workflow from symptom collection to prevention.</desc>
<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f5f9ff"/><stop offset="1" stop-color="#e6f3ff"/></linearGradient></defs>
<rect width="1400" height="430" rx="26" fill="url(#g)"/>
<text x="700" y="58" text-anchor="middle" font-family="Segoe UI,Arial" font-size="34" font-weight="700" fill="#0b3a67">Structured Troubleshooting Workflow</text>
<g font-family="Segoe UI,Arial" text-anchor="middle">
  <g transform="translate(60 120)"><rect width="190" height="150" rx="22" fill="#fff" stroke="#0078d4" stroke-width="4"/><circle cx="95" cy="42" r="25" fill="#0078d4"/><text x="95" y="50" font-size="24" font-weight="700" fill="#fff">1</text><text x="95" y="92" font-size="22" font-weight="700" fill="#0b3a67">Observe</text><text x="95" y="122" font-size="16" fill="#36566f">Symptoms &amp; impact</text></g>
  <g transform="translate(275 120)"><rect width="190" height="150" rx="22" fill="#fff" stroke="#00a4ef" stroke-width="4"/><circle cx="95" cy="42" r="25" fill="#00a4ef"/><text x="95" y="50" font-size="24" font-weight="700" fill="#fff">2</text><text x="95" y="92" font-size="22" font-weight="700" fill="#0b3a67">Scope</text><text x="95" y="122" font-size="16" fill="#36566f">Users, sites, DCs</text></g>
  <g transform="translate(490 120)"><rect width="190" height="150" rx="22" fill="#fff" stroke="#5b9bd5" stroke-width="4"/><circle cx="95" cy="42" r="25" fill="#5b9bd5"/><text x="95" y="50" font-size="24" font-weight="700" fill="#fff">3</text><text x="95" y="92" font-size="22" font-weight="700" fill="#0b3a67">Collect</text><text x="95" y="122" font-size="16" fill="#36566f">Logs &amp; commands</text></g>
  <g transform="translate(705 120)"><rect width="190" height="150" rx="22" fill="#fff" stroke="#7f5af0" stroke-width="4"/><circle cx="95" cy="42" r="25" fill="#7f5af0"/><text x="95" y="50" font-size="24" font-weight="700" fill="#fff">4</text><text x="95" y="92" font-size="22" font-weight="700" fill="#0b3a67">Isolate</text><text x="95" y="122" font-size="16" fill="#36566f">Root cause</text></g>
  <g transform="translate(920 120)"><rect width="190" height="150" rx="22" fill="#fff" stroke="#f59e0b" stroke-width="4"/><circle cx="95" cy="42" r="25" fill="#f59e0b"/><text x="95" y="50" font-size="24" font-weight="700" fill="#fff">5</text><text x="95" y="92" font-size="22" font-weight="700" fill="#0b3a67">Remediate</text><text x="95" y="122" font-size="16" fill="#36566f">Safest supported fix</text></g>
  <g transform="translate(1135 120)"><rect width="190" height="150" rx="22" fill="#fff" stroke="#16a34a" stroke-width="4"/><circle cx="95" cy="42" r="25" fill="#16a34a"/><text x="95" y="50" font-size="24" font-weight="700" fill="#fff">6</text><text x="95" y="92" font-size="22" font-weight="700" fill="#0b3a67">Validate</text><text x="95" y="122" font-size="16" fill="#36566f">Verify &amp; prevent</text></g>
</g>
<g stroke="#7aa7c7" stroke-width="4" fill="none"><path d="M250 195h25"/><path d="M465 195h25"/><path d="M680 195h25"/><path d="M895 195h25"/><path d="M1110 195h25"/></g>
<text x="700" y="352" text-anchor="middle" font-family="Segoe UI,Arial" font-size="21" fill="#36566f">Never begin with a destructive command. Preserve evidence, confirm replication health, and maintain a rollback path.</text>
<text x="700" y="390" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="600" fill="#0078d4">Active Directory Troubleshooting • github.com/toannguyenitoz</text>
